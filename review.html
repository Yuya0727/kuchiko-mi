<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口コミを書く｜HPラボ整体院</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #fafeff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .logo {
    font-size: 13px;
    color: #999;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    color: #1a1a2e;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .stars {
    font-size: 28px;
    margin: 16px 0;
    letter-spacing: 4px;
  }

  .desc {
    font-size: 14px;
    color: #666;
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .btn-main {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #4285f4, #34a853);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(66,133,244,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-main:active {
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(66,133,244,0.25);
  }

  .google-icon {
    display: inline-block;
    margin-right: 8px;
    font-size: 18px;
  }

  .note {
    font-size: 12px;
    color: #aaa;
    margin-top: 20px;
    line-height: 1.7;
  }

  .divider {
    height: 1px;
    background: #f0f0f0;
    margin: 24px 0;
  }

  .step {
    display: flex;
    align-items: flex-start;
    text-align: left;
    gap: 12px;
    margin-bottom: 14px;
  }

  .step-num {
    background: #4285f4;
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .step-text {
    font-size: 13px;
    color: #555;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">HP Lab 整体院</div>
  <h1>Googleマップに<br>口コミを書く</h1>
  <div class="stars">★★★★★</div>

  <div class="desc">
    下のボタンをタップして<br>Googleマップで口コミを投稿してください。
  </div>

  <a class="btn-main" href="https://g.page/r/CUpqgu_ehdySEAE/review" target="_blank" rel="noopener">
    <span class="google-icon">G</span>口コミを書く（Googleマップ）
  </a>

  <div class="divider"></div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">上のボタンをタップ</div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">「Chromeで開く」または「ブラウザで開く」を選択</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">星5つを選んで口コミを貼り付けて投稿！</div>
  </div>

  <p class="note">※エラーが出る場合はChromeアプリを<br>直接開いてからアクセスしてください</p>
</div>

<script>
  // iOSのSafari/Chrome、AndroidのChrome以外（WebView）の場合に注意を表示
  const ua = navigator.userAgent;
  const isWebView = (ua.includes('Android') && !ua.includes('Chrome')) ||
                    (ua.includes('iPhone') && !ua.includes('Safari')) ||
                    ua.includes('FBAN') || ua.includes('FBAV') ||
                    ua.includes('Line/') || ua.includes('Instagram');

  if (isWebView) {
    const note = document.querySelector('.note');
    note.innerHTML = '⚠️ このブラウザからは投稿できない場合があります。<br>「Chromeで開く」を選択するか、<br>Chromeアプリから直接開いてください。';
    note.style.color = '#e05a00';
    note.style.fontWeight = '700';
    note.style.fontSize = '13px';
  }
</script>
</body>
</html>
